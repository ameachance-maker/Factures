<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto p-6 max-w-4xl">
        <h1 class="text-3xl font-bold text-center mb-6">🛠 Espace Admin - Gestion des Produits</h1>
        <a href="/" class="text-blue-600 hover:underline mb-4 inline-block">Retour à la création de facture</a>
        
        <form id="productForm" class="bg-white p-6 rounded-lg shadow-md mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="productName" class="block text-sm font-medium text-gray-700">Nom du produit</label>
                    <input type="text" id="productName" name="productName" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
                <div>
                    <label for="productPrice" class="block text-sm font-medium text-gray-700">Prix Unitaire (€)</label>
                    <input type="number" id="productPrice" name="productPrice" min="0" step="0.01" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
            </div>
            <button type="submit" class="mt-4 bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700">Ajouter Produit</button>
        </form>
        
        <h2 class="text-xl font-semibold mb-4">Liste des Produits</h2>
        <div id="productList" class="bg-white p-6 rounded-lg shadow-md">
            <table class="w-full">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-2 text-left">Nom</th>
                        <th class="p-2 text-left">Prix (€)</th>
                        <th class="p-2 text-left">Actions</th>
                    </tr>
                </thead>
                <tbody id="productTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadProducts() {
            const response = await fetch('/products');
            const products = await response.json();
            const table = document.getElementById('productTable');
            table.innerHTML = '';
            products.forEach(product => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="p-2">${product.name}</td>
                    <td class="p-2">${product.price.toFixed(2)} €</td>
                    <td class="p-2">
                        <button class="text-red-600 hover:text-red-800 delete-product" data-name="${product.name}">Supprimer</button>
                    </td>
                `;
                table.appendChild(row);
            });
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('productName').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            await fetch('/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price })
            });
            document.getElementById('productForm').reset();
            loadProducts();
        });

        document.getElementById('productList').addEventListener('click', async (e) => {
            if (e.target.classList.contains('delete-product')) {
                const name = e.target.dataset.name;
                await fetch(`/products/${name}`, { method: 'DELETE' });
                loadProducts();
            }
        });

        loadProducts();
    </script>
</body>
</html>
